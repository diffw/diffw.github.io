baseURL: https://diff.im/
defaultContentLanguage: zh-cn
defaultContentLanguageInSubdir: false
timeZone: America/Chicago
enableRobotsTXT: true

# Plain-text content map for LLM crawlers (llmstxt.org), emitted at /llms.txt
# (and /en/llms.txt) from layouts/index.llms.txt.
outputFormats:
  LLMS:
    mediaType: text/plain
    baseName: llms
    isPlainText: true
    rel: alternate
outputs:
  home:
    - HTML
    - RSS
    - LLMS

params:
  i18n:
    # Fallback language for unmatched browser languages and hreflang x-default.
    xDefaultLang: en

frontmatter:
  date:
    - date
  lastmod:
    - lastmod
  publishDate:
    - publishDate

languages:
  zh-cn:
    languageCode: zh-CN
    languageName: 中文
    weight: 1
    title: Diff客旅日志
    params:
      author:
        name: Diff
      description: 记录信仰、设计、家庭与工作中的思考。
    permalinks:
      page:
        posts: /blog/:year/:month/:slug/
      section:
        posts: /blog/
  en:
    languageCode: en
    languageName: English
    weight: 2
    title: Diff's Pilgrimage Notes
    params:
      author:
        name: Diff
      description: Notes on faith, design, family and work.
    permalinks:
      page:
        posts: /blog/:year/:month/:slug/
      section:
        posts: /blog/
