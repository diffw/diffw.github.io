{{ define "main" }}
  <section class="block">
    <h1 class="h1" style="margin-bottom: 8px;">{{ .Title }}</h1>
    <div class="mute" style="font-size: 13px;">
      {{ i18n "tag_count" (dict "count" (len .Pages)) }}
    </div>
  </section>
  <section style="padding-bottom: 48px;">
    {{ range .Pages.ByDate.Reverse }}
      {{ $d := .Date }}
      <a class="post-row" href="{{ .RelPermalink }}">
        <span class="title">{{ .Title }}</span>
        <span class="date">{{ $d.Format "06.01.02" }}</span>
      </a>
    {{ end }}
  </section>
{{ end }}
